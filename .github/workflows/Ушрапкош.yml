name: Build MultiCraft APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-28
          
    - name: Build APK
      run: |
        cd build/android
        chmod +x gradlew
        # Форсируем использование Java 11 для Gradle, сохраняя 17 для SDK
        export JAVA_HOME=$JAVA_HOME_17_X64
        # Добавляем параметры совместимости
        ./gradlew assembleDebug -Dorg.gradle.jvmargs=-XX:MaxMetaspaceSize=512m
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MultiCraft-APK
        path: build/android/app/build/outputs/apk/debug/*.apk
