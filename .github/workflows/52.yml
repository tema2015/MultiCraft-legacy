name: Build MultiCraft APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17 for SDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-28
          
    - name: Download all dependencies
      run: |
        cd build/android
        git clone --depth 1 https://github.com/MultiCraft/deps.git deps_repo
        for lib in deps_repo/Android/*; do
          if [ -d "$lib" ]; then
            libname=$(basename "$lib")
            echo "Копируем библиотеку: $libname"
            mkdir -p "native/deps/Android/$libname"
            cp -r "$lib"/* "native/deps/Android/$libname/"
          fi
        done
        
    - name: Set up JDK 11 for Gradle
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Fix iconv with stub
      run: |
        cd build/android/native/jni
        
        # Создаём файл-заглушку
        cat > iconv_stub.cpp << 'EOF'
        #include <stddef.h>
        typedef void* iconv_t;
        
        iconv_t iconv_open(const char* to, const char* from) {
            return (iconv_t)1;
        }
        
        size_t iconv(iconv_t cd, char** inbuf, size_t* inbytesleft,
                     char** outbuf, size_t* outbytesleft) {
            return (size_t)-1;
        }
        
        int iconv_close(iconv_t cd) {
            return 0;
        }
        EOF
        
        # Добавляем заглушку в Android.mk
        if ! grep -q "iconv_stub.cpp" Android.mk; then
          sed -i '/LOCAL_SRC_FILES :=/ s/$/ iconv_stub.cpp/' Android.mk
        fi
        
        echo "✅ Заглушка iconv добавлена"
        
    - name: Build APK
      run: |
        cd build/android
        chmod +x gradlew
        export JAVA_HOME=$JAVA_HOME_11_X64
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MultiCraft-APK
        path: |
          build/android/app/build/outputs/apk/debug/*.apk
          build/android/build/outputs/apk/debug/*.apk
