name: Build MultiCraft APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17 for SDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-28
          
    - name: Download all dependencies
      run: |
        cd build/android
        git clone --depth 1 https://github.com/MultiCraft/deps.git deps_repo
        for lib in deps_repo/Android/*; do
          if [ -d "$lib" ]; then
            libname=$(basename "$lib")
            echo "Копируем библиотеку: $libname"
            mkdir -p "native/deps/Android/$libname"
            cp -r "$lib"/* "native/deps/Android/$libname/"
          fi
        done
        
    - name: Set up JDK 11 for Gradle
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Fix iconv - disable in config
      run: |
        cd build/android/native/jni
        # Отключаем USE_ICONV в конфиге
        sed -i 's/#define USE_ICONV 1/#define USE_ICONV 0/' ../../../../src/config.h || true
        # Ищем другие возможные места
        find ../../../../src -name "*.h" -exec sed -i 's/#define USE_ICONV 1/#define USE_ICONV 0/g' {} \;
        echo "✅ USE_ICONV отключён"
        
    - name: Build APK
      run: |
        cd build/android
        chmod +x gradlew
        export JAVA_HOME=$JAVA_HOME_11_X64
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MultiCraft-APK
        path: |
          build/android/app/build/outputs/apk/debug/*.apk
          build/android/build/outputs/apk/debug/*.apk
