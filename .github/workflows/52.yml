name: Build MultiCraft APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Шаг 1: JDK 17 для установки SDK
    - name: Set up JDK 17 for SDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-28
          
    # Шаг 2: Скачиваем ВСЕ зависимости разом
    - name: Download all dependencies
      run: |
        cd build/android
        
        # Клонируем репозиторий с зависимостями
        git clone --depth 1 https://github.com/MultiCraft/deps.git deps_repo
        
        # Копируем КАЖДУЮ папку из deps_repo/Android/ в native/deps/Android/
        for lib in deps_repo/Android/*; do
          if [ -d "$lib" ]; then
            libname=$(basename "$lib")
            echo "Копируем библиотеку: $libname"
            mkdir -p "native/deps/Android/$libname"
            cp -r "$lib"/* "native/deps/Android/$libname/"
          fi
        done
        
        # Проверяем результат
        echo "=== Проверка структуры ==="
        ls -la native/deps/Android/
        echo "=== Проверка Curl ==="
        ls -la native/deps/Android/Curl/clang/arm64-v8a/libcurl.a && echo "✅ libcurl.a"
        echo "=== Проверка Freetype ==="
        ls -la native/deps/Android/Freetype/clang/arm64-v8a/libfreetype.a && echo "✅ libfreetype.a"
        
    # Шаг 3: Переключаемся на JDK 11 для сборки
    - name: Set up JDK 11 for Gradle
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Build APK
      run: |
        cd build/android
        chmod +x gradlew
        export JAVA_HOME=$JAVA_HOME_11_X64
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MultiCraft-APK
        path: |
          build/android/app/build/outputs/apk/debug/*.apk
          build/android/build/outputs/apk/debug/*.apk
