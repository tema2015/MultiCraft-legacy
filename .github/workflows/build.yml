name: Build MultiCraft APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Install Android SDK
      run: |
        # Скачиваем command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        
        # Настраиваем структуру папок
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        
        # Устанавливаем переменные окружения
        echo "ANDROID_SDK_ROOT=$(pwd)/android-sdk" >> $GITHUB_ENV
        echo "$(pwd)/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Принимаем лицензии
        yes | sdkmanager --licenses > /dev/null 2>&1
        
        # Устанавливаем СТАРЫЕ версии для совместимости с проектом 2022 года
        sdkmanager "platforms;android-28" "build-tools;28.0.3" "ndk;21.4.7075529"
        
    - name: Build APK
      run: |
        cd build/android
        chmod +x build.sh
        ./build.sh
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MultiCraft-APK
        path: build/android/*.apk
